name: TLA+ Formal Verification CI

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "docs/spec/**"
      - ".github/workflows/**"

  pull_request:
    branches:
      - main
      - develop
    paths:
      - "docs/spec/**"
      - ".github/workflows/**"

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tla-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tla-smoke-test:
    name: TLC Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      JAVA_TOOL_OPTIONS: "-Xmx2g"
      TLC_JAR: tla2tools.jar

    defaults:
      run:
        shell: bash
        working-directory: docs/spec

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Download TLA+ tools
        run: |
          curl -fsSL \
            -o "$TLC_JAR" \
            https://github.com/tlaplus/tlaplus/releases/download/v1.8.0/tla2tools.jar

      - name: Verify TLC jar
        run: |
          test -f "$TLC_JAR"
          java -jar "$TLC_JAR" -help > /dev/null

      - name: Run TLC smoke test
        run: |
          echo "Starting TLA+ Smoke Test..."

          java \
            -XX:+UseParallelGC \
            -jar "$TLC_JAR" \
            -simulate \
            -depth 50 \
            -config mc/server/MC_ServerRefinementSafety.cfg \
            mc/server/MC_ServerRefinementSafety.tla

          echo "TLA+ Smoke Test completed successfully."

      - name: Upload TLC artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tla-logs
          path: |
            docs/spec/**/*.out
            docs/spec/**/*.log
            docs/spec/**/*.trace
          if-no-files-found: ignore