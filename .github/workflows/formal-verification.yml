name: TLA+ Formal Verification CI

on:
  push:
    branches:
      - main
      - master
      - develop
    paths:
      - 'docs/spec/**'

jobs:
  tla-smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
      
      - name: Download TLA+ Tools
        run: curl -L -o tla2tools.jar https://github.com/tlaplus/tlaplus/releases/download/v1.8.0/tla2tools.jar
      
      - name: Run TLC Smoke Test
        working-directory: docs/spec
        run: |
          echo "Starting TLA+ Smoke Test..."
          java -XX:+UseParallelGC -Xmx2g -jar ../../tla2tools.jar -simulate -depth 50 -I core -config mc/server/MC_ServerRefinementSafety.cfg mc/server/MC_ServerRefinementSafety.tla
          echo "TLA+ Smoke Test completed!"