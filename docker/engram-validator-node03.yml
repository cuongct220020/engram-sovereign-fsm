name: engram-validator-node03

services:
  stratium-node03:
    build: 
      context: ..
      dockerfile: Dockerfile
    hostname: stratium-node03
    container_name: stratium-node03
    networks:
      engram-net:
        ipv4_address: 172.20.0.120
    volumes:
      - stratium-node03-data:/root/.stratium
    ports:
      # Offset ports by 200 to avoid conflicts
      - "26857:26657"   # Tendermint RPC (exposed)
      - "1517:1317"     # Cosmos REST API (exposed)
      - "26860:26660"   # Prometheus Metrics (exposed)
    environment:
      - DA_ENDPOINT=http://celestia-light03:26658
      - MINIMUM_GAS_PRICES=0strat
      - MONIKER=stratium-node03
      - NODE_ID=2
    command: ["stratiumd", "start", "--prometheus"]
    restart: unless-stopped
    depends_on:
      celestia-light03:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:26657/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 768M
        reservations:
          cpus: '0.2'
          memory: 256M

  #  VIGILANTE SUBMITTER 
  vigilante-submitter03:
    image: babylonlabs/babylond:main${BABYLOND_VERSION:-.latest}
    container_name: vigilante-submitter03
    hostname: vigilante-submitter03
    networks:
      engram-net:
        ipv4_address: 172.20.0.121
      bitcoin-net:
        ipv4_address: 172.21.0.120
    volumes:
      - ../config/submitter.toml:/home/babylon/config/submitter.toml:ro
      - vigilante-submitter-2-data:/home/babylon/.babylon
    environment:
      - NODE_ADDR=http://stratium-node03:26657
      - BITCOIN_HOST=bitcoin-node-01
      - BITCOIN_RPC_PORT=18443
      - NODE_ID=2
    restart: unless-stopped
    depends_on:
      stratium-node03:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.15'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 64M
    command:
      - vigilante
      - submitter
      - --config=/home/babylon/config/submitter.toml

  #  VIGILANTE REPORTER 
  vigilante-reporter03:
    image: babylonlabs/babylond:main${BABYLOND_VERSION:-.latest}
    container_name: vigilante-reporter03
    hostname: vigilante-reporter03
    networks:
      engram-net:
        ipv4_address: 172.20.0.122
      bitcoin-net:
        ipv4_address: 172.21.0.121
    volumes:
      - ../config/reporter.toml:/home/babylon/config/reporter.toml:ro
      - vigilante-reporter03-data:/home/babylon/.babylon
    environment:
      - NODE_ADDR=http://stratium-node03:26657
      - BITCOIN_HOST=bitcoin-node01
      - NODE_ID=2
    restart: unless-stopped
    depends_on:
      stratium-node03:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.15'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 64M
    command:
      - vigilante
      - reporter
      - --config=/home/babylon/config/reporter.toml

  #  VIGILANTE MONITOR
  checkpointing-monitor03:
    image: babylonlabs/babylond:main${BABYLOND_VERSION:-.latest}
    container_name: checkpointing-monitor03
    hostname: checkpointing-monitor03
    networks:
      engram-net:
        ipv4_address: 172.20.0.123
      bitcoin-net:
        ipv4_address: 172.21.0.122
    volumes:
      - ../config/monitor.toml:/home/babylon/config/monitor.toml:ro
      - checkpointing-monitor03-data:/home/babylon/.babylon
    environment:
      - NODE_ADDR=http://stratium-node03:26657
      - BITCOIN_HOST=bitcoin-node01
      - NODE_ID=2
    restart: unless-stopped
    depends_on:
      stratium-node03:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 100M
        reservations:
          cpus: '0.05'
          memory: 50M
    command:
      - vigilante
      - monitor
      - --config=/home/babylon/config/monitor.toml

  # ==================== CELESTIA LIGHT NODE ====================
  celestia-light03:
    image: ghcr.io/celestiaorg/celestia-node:${CELESTIA_NODE_VERSION:-v0.14.1}
    container_name: celestia-light03
    hostname: celestia-light03
    networks:
      engram-net:
        ipv4_address: 172.20.0.124
      celestia-net:
        ipv4_address: 172.22.0.102
    volumes:
      - celestia-light-2-data:/home/celestia
    ports:
      - "26759:26658"   # RPC (exposed, offset by 200)
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-s", "http://127.0.0.1:26658/header/1 || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      celestia-app:
        condition: service_healthy
    environment:
      - NODE_TYPE=light
      - P2P_NETWORK=private
      - NODE_ID=2
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M
    command: >
      sh -c "
      if [ ! -d /home/celestia/.light ]; then
        celestia light init --p2p.network private --ip 0.0.0.0
      fi
      celestia light start --core.ip celestia-app --p2p.network private --rpc.addr 0.0.0.0 --rpc.port 26658
      "

networks:
  engram-net:
    name: engram-net
    external: true
  bitcoin-net:
    name: bitcoin-net
    external: true
  celestia-net:
    name: celestia-net
    external: true

volumes:
  stratium-node03-data:
    name: stratium-node03-data
    driver: local
  vigilante-submitter03-data:
    name: vigilante-submitter03-data
    driver: local
  vigilante-reporter03-data:
    name: vigilante-reporter03-data
    driver: local
  checkpointing-monitor03-data:
    name: checkpointing-monitor03-data
    driver: local
  celestia-light03-data:
    name: celestia-light03-data
    driver: local