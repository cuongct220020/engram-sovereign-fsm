name: celestia-local-cluster

services:
  celestia-app:
    image: ghcr.io/celestiaorg/celestia-app:${CELESTIA_APP_VERSION:-v1.11.0}
    container_name: celestia-app
    hostname: celestia-app
    networks:
      celestia-net:
        ipv4_address: 172.22.0.50
    ports:
      - "26656:26656"
      - "26657:26657"
      - "26658:26658"
      - "9090:9090"
    environment:
      - CELESTIA_CHAIN_ID=engram-dev-1
    volumes:
      - ./data/celestia-app:/home/celestia
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-s", "http://127.0.0.1:26657/status | grep -q latest_block_height"]
      interval: 30s
      timeout: 10s
      retries: 2
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          cpus: '0.2'
          memory: 512M
    command: >
      sh -c "
      if [ ! -f /home/celestia/config/config.toml ]; then
        celestia-appd init mynode --chain-id engram-dev-1 --keyring-backend test &&
        celestia-appd keys add admin --keyring-backend test >> /home/celestia/admin_seed.txt 2>&1
      fi
      celestia-appd start --rpc.laddr tcp://0.0.0.0:26657
      "

  celestia-bridge:
    image: ghcr.io/celestiaorg/celestia-node:${CELESTIA_NODE_VERSION:-v0.14.1}
    container_name: celestia-bridge
    hostname: celestia-bridge
    networks:
      celestia-net:
        ipv4_address: 172.22.0.51
    ports:
      - "2121:2121"
      - "26658:26658"
    volumes:
      - ./data/celestia-bridge:/home/celestia
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-s", "http://127.0.0.1:26658/header/1 || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 2
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 256M
    depends_on:
      celestia-app:
        condition: service_healthy
    environment:
      - NODE_TYPE=bridge
      - P2P_NETWORK=private
    command: >
      sh -c "
      if [ ! -d /home/celestia/.bridge ]; then
        celestia bridge init --p2p.network private &&
        celestia bridge auth admin --p2p.network private > /home/celestia/bridge_auth.txt 2>&1
      fi
      celestia bridge start --core.ip celestia-app --p2p.network private --rpc.addr 0.0.0.0 --rpc.port 26658
      "

 
networks:
  celestia-net:
    name: celestia-net
    driver: bridge


volumes:
  celestia-validator-data:
    name: celestia-validator-data
  celestia-bridge-data:
    name: celestia-bridge-data