name: engram-validator-node04

services:
  stratium-node04:
    build: 
      context: ..
      dockerfile: Dockerfile
    hostname: stratium-node04
    container_name: stratium-node04
    networks:
      engram-net:
        ipv4_address: 172.20.0.130
    volumes:
      - stratium-node04-data:/root/.stratium
    ports:
      # Offset ports by 300 to avoid conflicts
      - "26957:26657"   # Tendermint RPC (exposed)
      - "1617:1317"     # Cosmos REST API (exposed)
      - "26960:26660"   # Prometheus Metrics (exposed)
    environment:
      - DA_ENDPOINT=http://celestia-light04:26658
      - MINIMUM_GAS_PRICES=0strat
      - MONIKER=stratium-node04
      - NODE_ID=3
    command: ["stratiumd", "start", "--prometheus"]
    restart: unless-stopped
    depends_on:
      celestia-light04:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:26657/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 768M
        reservations:
          cpus: '0.2'
          memory: 256M

  # VIGILANTE SUBMITTER 
  vigilante-submitter04:
    image: babylonlabs/babylond:main${BABYLOND_VERSION:-.latest}
    container_name: vigilante-submitter04
    hostname: vigilante-submitter04
    networks:
      engram-net:
        ipv4_address: 172.20.0.131
      bitcoin-net:
        ipv4_address: 172.21.0.130
    volumes:
      - ../config/submitter.toml:/home/babylon/config/submitter.toml:ro
      - vigilante-submitter04-data:/home/babylon/.babylon
    environment:
      - NODE_ADDR=http://stratium-node04:26657
      - BITCOIN_HOST=bitcoin-node01
      - BITCOIN_RPC_PORT=18443
      - NODE_ID=3
    restart: unless-stopped
    depends_on:
      stratium-node04:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.15'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 64M
    command:
      - vigilante
      - submitter
      - --config=/home/babylon/config/submitter.toml

  #  VIGILANTE REPORTER 
  vigilante-reporter04:
    image: babylonlabs/babylond:main${BABYLOND_VERSION:-.latest}
    container_name: vigilante-reporter04
    hostname: vigilante-reporter04
    networks:
      engram-net:
        ipv4_address: 172.20.0.132
      bitcoin-net:
        ipv4_address: 172.21.0.131
    volumes:
      - ../config/reporter.toml:/home/babylon/config/reporter.toml:ro
      - vigilante-reporter04-data:/home/babylon/.babylon
    environment:
      - NODE_ADDR=http://stratium-node04:26657
      - BITCOIN_HOST=bitcoin-node01
      - NODE_ID=3
    restart: unless-stopped
    depends_on:
      stratium-node04:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.15'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 64M
    command:
      - vigilante
      - reporter
      - --config=/home/babylon/config/reporter.toml

  #  VIGILANTE MONITOR 
  checkpointing-monitor04:
    image: babylonlabs/babylond:main${BABYLOND_VERSION:-.latest}
    container_name: checkpointing-monitor04
    hostname: checkpointing-monitor04
    networks:
      engram-net:
        ipv4_address: 172.20.0.133
      bitcoin-net:
        ipv4_address: 172.21.0.132
    volumes:
      - ../config/monitor.toml:/home/babylon/config/monitor.toml:ro
      - checkpointing-monitor04-data:/home/babylon/.babylon
    environment:
      - NODE_ADDR=http://stratium-node04:26657
      - BITCOIN_HOST=bitcoin-node01
      - NODE_ID=3
    restart: unless-stopped
    depends_on:
      stratium-node-3:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 100M
        reservations:
          cpus: '0.05'
          memory: 50M
    command:
      - vigilante
      - monitor
      - --config=/home/babylon/config/monitor.toml

  # ==================== CELESTIA LIGHT NODE ====================
  celestia-light04:
    image: ghcr.io/celestiaorg/celestia-node:${CELESTIA_NODE_VERSION:-v0.14.1}
    container_name: celestia-light04
    hostname: celestia-light04
    networks:
      engram-net:
        ipv4_address: 172.20.0.134
      celestia-net:
        ipv4_address: 172.22.0.103
    volumes:
      - celestia-light--data:/home/celestia
    ports:
      - "26760:26658"   # RPC (exposed, offset by 300)
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-s", "http://127.0.0.1:26658/header/1 || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      celestia-app:
        condition: service_healthy
    environment:
      - NODE_TYPE=light
      - P2P_NETWORK=private
      - NODE_ID=3
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M
    command: >
      sh -c "
      if [ ! -d /home/celestia/.light ]; then
        celestia light init --p2p.network private --ip 0.0.0.0
      fi
      celestia light start --core.ip celestia-app --p2p.network private --rpc.addr 0.0.0.0 --rpc.port 26658
      "

networks:
  engram-net:
    name: engram-net
    external: true
  bitcoin-net:
    name: bitcoin-net
    external: true
  celestia-net:
    name: celestia-net
    external: true

volumes:
  stratium-node04-data:
    name: stratium-node04-data
    driver: local
  vigilante-submitter04-data:
    name: vigilante-submitter04-data
    driver: local
  vigilante-reporter04-data:
    name: vigilante-reporter04-data
    driver: local
  checkpointing-monitor04-data:
    name: checkpointing-monitor04-data
    driver: local
  celestia-light04-data:
    name: celestia-light04-data
    driver: local