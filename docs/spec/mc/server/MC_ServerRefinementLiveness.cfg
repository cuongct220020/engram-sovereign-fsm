SPECIFICATION MC_ServerSpec

CONSTANTS
    n1 = n1
    n2 = n2
    n3 = n3
    n4 = n4

    \* OPERATOR SUBSTITUTIONS
    Nodes    <- MC_Nodes
    Method   <- MC_Method
    Faulty   <- MC_Faulty
    Corr     <- MC_Corr
    Proposer <- MC_Proposer
    
    \* NUMERIC BOUNDS 
    \* Liveness run uses smaller bounds (MAX_ROUND=2) — fairness checking is expensive.
    MAX_ROUND         = 2
    MAX_TIMESTAMP     = 4
    MAX_BTC_HEIGHT    = 2
    MAX_ENGRAM_HEIGHT = 2
    MAX_IGNORE_ROUNDS = 1
    RESET_TIME = 2

    \* FSM THRESHOLDS 
    SUSPICIOUS_THRESHOLD = 2
    SOVEREIGN_THRESHOLD = 4
    DA_THRESHOLD = 2
    HYSTERESIS_WAIT = 1
    MIN_PEERS = 2
    MIN_SUBNET_DIVERSITY = 2
    MIN_ANCHOR_PEERS = 1
    MAX_CHURN_RATE = 1
    MIN_AVG_TENURE = 1
    MAX_PEER_LATENCY = 1

    \* CONSENSUS PARAMETERS 
    N = 4
    T = 1
    MIN_TIMESTAMP = 0
    PRECISION = 0
    DELAY = 1
    TIMEOUT_DURATION = 2

CONSTRAINT StateSpaceLimit

INVARIANTS
    FSMTypeOK
    CoreTendermintInvariant
    HybridTendermintInvariant
    CircuitBreakerSafety

PROPERTIES
    ServerEventualDecision
    ServerFSMLiveness
    EventualDecisionUnderGST
    ForcedInclusionLiveness
    ZKProofGenerationLiveness
    PersistentEclipseResolution
    RefinementLiveness