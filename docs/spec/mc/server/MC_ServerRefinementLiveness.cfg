SPECIFICATION MC_Server_Spec

CONSTANTS
    n1 = n1
    n2 = n2
    n3 = n3
    n4 = n4

    \* OPERATOR SUBSTITUTIONS
    Nodes    <- MC_Nodes
    Method   <- MC_Method
    Faulty   <- MC_Faulty
    Corr     <- MC_Corr
    Proposer <- MC_Proposer
    
    \* NUMERIC BOUNDS 
    \* Liveness run uses smaller bounds (MAX_ROUND=2) — fairness checking is expensive.
    MAX_ROUND         = 2
    MAX_TIMESTAMP     = 4
    MAX_BTC_HEIGHT    = 2
    MAX_ENGRAM_HEIGHT = 2
    MAX_IGNORE_ROUNDS = 1
    ResetTime         = 2

    \* FSM THRESHOLDS 
    T_SUSPICIOUS    = 2
    T_SOVEREIGN     = 5
    T_DA            = 2
    HYSTERESIS_WAIT = 1
    MIN_PEERS            = 2
    MIN_SUBNET_DIVERSITY = 2
    MIN_ANCHOR_PEERS     = 2

    \* CONSENSUS PARAMETERS 
    N               = 4
    T               = 1
    MIN_TIMESTAMP   = 0
    Precision       = 0
    Delay           = 1
    TimeoutDuration = 2

CONSTRAINT StateSpaceLimit

INVARIANTS
    TypeOK
    CoreTendermintInv
    HybridTendermintInv
    CircuitBreakerSafety

PROPERTIES
    ServerEventualDecision
    ServerFSMLiveness
    EventualDecisionUnderGST
    ForcedInclusionLiveness
    RefinementLiveness