INIT MC_ServerInit
NEXT MC_ServerNext

CONSTANTS
    n1 = n1
    n2 = n2
    n3 = n3
    n4 = n4
    n5 = n5
    n6 = n6
    n7 = n7

    \* OPERATOR SUBSTITUTIONS 
    Nodes    <- MC_Nodes
    Method   <- MC_Method
