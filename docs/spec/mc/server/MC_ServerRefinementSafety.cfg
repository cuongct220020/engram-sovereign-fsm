INIT MC_ServerInit
NEXT MC_ServerNext

CONSTANTS
    n1 = n1
    n2 = n2
    n3 = n3
    n4 = n4

    \* OPERATOR SUBSTITUTIONS 
    Nodes    <- MC_Nodes
    Method   <- MC_Method
    Faulty   <- MC_Faulty
    Corr     <- MC_Corr
    Proposer <- MC_Proposer

    \* NUMERIC BOUNDS 
    \* Safety run uses larger bounds (MaxRound=3) — no fairness overhead.
    MAX_ROUND = 4
    MAX_BTC_HEIGHT = 4
    MAX_ENGRAM_HEIGHT = 4

    MAX_IGNORE_ROUNDS = 1
    RESET_TIME = 2

    \* FSM THRESHOLDS 
    SUSPICIOUS_THRESHOLD = 1
    SOVEREIGN_THRESHOLD = 2
    DA_THRESHOLD = 2
    HYSTERESIS_WAIT = 1
    MAX_SUSPICIOUS_TIME = 2
    MIN_PEERS = 2
    MIN_SUBNET_DIVERSITY = 2
    MIN_ANCHOR_PEERS = 1
    MAX_CHURN_RATE = 1
    MIN_AVG_TENURE = 1
    MAX_PEER_LATENCY = 1


    \* CONSENSUS PARAMETERS 
    N = 4
    T = 1
    MAX_TIMESTAMP = 3
    MIN_TIMESTAMP = 0
    PRECISION = 0
    DELAY = 1
    TIMEOUT_DURATION = 2

CONSTRAINT StateSpaceLimit

INVARIANTS
    FSMTypeOK
    CoreTendermintInvariant
    HybridTendermintInvariant
    CircuitBreakerSafety

PROPERTIES
    HysteresisSafety
    MonotonicitySafety    
    StrictFSMTransitionSafety
    RefinementSafety