    Corr     <- MC_Corr
    Proposer <- MC_Proposer

    \* NUMERIC BOUNDS 
    MAX_ROUND = 4
    MAX_BTC_HEIGHT = 3
    MAX_ENGRAM_HEIGHT = 3
    MAX_TIMESTAMP = 8

    MAX_IGNORE_ROUNDS = 1
    RESET_TIME = 2

    \* FSM THRESHOLDS 
    SUSPICIOUS_THRESHOLD = 1
    SOVEREIGN_THRESHOLD = 2
    DA_THRESHOLD = 2
    HYSTERESIS_WAIT = 1
    MAX_SUSPICIOUS_TIME = 2
    MIN_PEERS = 2
    MIN_SUBNET_DIVERSITY = 2
    MIN_ANCHOR_PEERS = 1
    MAX_CHURN_RATE = 1
    MIN_AVG_TENURE = 1
    MAX_PEER_LATENCY = 1


    \* CONSENSUS PARAMETERS
    \* N = 4
    \* T = 1 
    N = 7
    T = 2
    MIN_TIMESTAMP = 0
    PRECISION = 0
    DELAY = 1
    TIMEOUT_DURATION = 2

CONSTRAINT StateSpaceLimit


INVARIANTS
    FSMTypeOK
    CoreTendermintInvariant
    HybridTendermintInvariant
    CircuitBreakerSafety

PROPERTIES
    HysteresisSafety
    MonotonicitySafety    
    StrictFSMTransitionSafety
    RefinementSafety