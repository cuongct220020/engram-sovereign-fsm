INIT MC_Server_Init
NEXT MC_Server_Next

CONSTANTS
    n1 = n1
    n2 = n2
    n3 = n3
    n4 = n4

    \* OPERATOR SUBSTITUTIONS 
    Nodes    <- MC_Nodes
    Method   <- MC_Method
    Faulty   <- MC_Faulty
    Corr     <- MC_Corr
    Proposer <- MC_Proposer

    \* NUMERIC BOUNDS 
    \* Safety run uses larger bounds (MaxRound=3) — no fairness overhead.
    MAX_ROUND         = 3
    MAX_TIMESTAMP     = 4
    MAX_BTC_HEIGHT    = 3
    MAX_ENGRAM_HEIGHT = 3
    MAX_IGNORE_ROUNDS = 1
    ResetTime         = 2

    \* FSM THRESHOLDS 
    T_SUSPICIOUS   = 2
    T_SOVEREIGN    = 5
    T_DA           = 2
    HYSTERESIS_WAIT = 1
    MIN_PEERS           = 2
    MIN_SUBNET_DIVERSITY = 2
    MIN_ANCHOR_PEERS    = 2

    \* CONSENSUS PARAMETERS 
    N               = 4
    T               = 1
    MIN_TIMESTAMP   = 0
    Precision       = 0
    Delay           = 1
    TimeoutDuration = 2

CONSTRAINT StateSpaceLimit

INVARIANTS
    TypeOK
    CoreTendermintInv
    HybridTendermintInv
    CircuitBreakerSafety

PROPERTIES
    HysteresisSafety
    RefinementSafety