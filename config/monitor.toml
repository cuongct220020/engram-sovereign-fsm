# --- Cấu hình kết nối Bitcoin ---
[bitcoin]
network = "regtest"
# Node chính mà Reporter đang bám theo
rpc_url = "http://engram_admin:secure_password_123@btc-primary:18443"
# Cổng ZMQ để nhận thông báo block tức thì
zmq_url = "tcp://btc-primary:28332"

# --- Cấu hình P2P để phát hiện Fork sớm ---
# Đây là điểm mấu chốt: Monitor kết nối trực tiếp tới node thứ 2 
# để xem "thế giới bên ngoài" có đang đào chuỗi khác không.
[p2p]
seeds = "btc-secondary:18444" 
poll_interval = "5s"

# --- Cấu hình Babylon App-chain (Engram) ---
[babylon]
grpc_url = "http://engram-app:9090"
# Khoảng cách block Bitcoin tối đa cho phép trước khi báo động "Stall"
max_block_delay = 10 

# --- Cấu hình Cảnh báo (Monitor Core) ---
[monitor]
# Thời gian chờ giữa các lần quét (tính bằng milliseconds)
# Càng nhỏ thì phát hiện Reorg càng nhanh, nhưng tốn CPU
backoff = 2000 

# Cấu hình "Báo động" khi có sự cố
[alarm]
# Loại báo động: "log" (in ra terminal) hoặc "webhook" (gửi đi)
type = "log"
# Nếu dùng Webhook (ví dụ gửi sang một con bot quản lý FSM của Engram)
# url = "http://engram-fsm-controller:8080/alarm"

# Reorg Detection Configuration
[reorg]
# Số lượng block sâu nhất mà Monitor sẽ kiểm tra ngược lại
# Với Engram, 6-12 block là an toàn
check_depth = 20