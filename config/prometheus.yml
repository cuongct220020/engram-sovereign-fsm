global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'stratium-cluster'
    cluster: 'engram-bft'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Stratium Node 1
  - job_name: 'stratium-node-01'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['stratium-node-01:26660']
        labels:
          instance: 'stratium-node-01'
          node_id: '1'
          validator: 'true'

  # Stratium Node 2
  - job_name: 'stratium-node-02'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['stratium-node-02:26660']
        labels:
          instance: 'stratium-node-02'
          node_id: '2'
          validator: 'true'

  # Stratium Node 3
  - job_name: 'stratium-node-03'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['stratium-node-03:26660']
        labels:
          instance: 'stratium-node-03'
          node_id: '3'
          validator: 'true'

  # Stratium Node 4
  - job_name: 'stratium-node-04'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['stratium-node-04:26660']
        labels:
          instance: 'stratium-node-04'
          node_id: '4'
          validator: 'true'
