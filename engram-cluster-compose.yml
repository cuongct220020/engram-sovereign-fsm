name: Stratium Node Cluster

services:
  # Node 1 - Validator
  stratium-node-01:
    build: 
      context: .
      dockerfile: Dockerfile
    hostname: stratium-node-01
    container_name: stratium-node-01
    networks:
      engram-net:
        ipv4_address: 172.20.0.10
    volumes:
      - ./build/testnet/node1:/root/.stratium
    ports:
      - "26657:26657"   # Tendermint RPC
      - "1317:1317"     # Cosmos REST API
      - "26660:26660"   # Prometheus Metrics
    environment:
      - DA_ENDPOINT=http://celestia_mock:8080
      - MINIMUM_GAS_PRICES=0strat
      - MONIKER=stratium-node-01
    command: ["stratiumd", "start", "--prometheus"]
    depends_on:
      - celestia_mock
    restart: unless-stopped


  # Node 2 - Validator
  stratium-node-02:
    build: 
      context: .
      dockerfile: Dockerfile
    hostname: stratium-node-02
    container_name: stratium-node-02
    networks:
      engram-net:
        ipv4_address: 172.20.0.11
    volumes:
      - ./build/testnet/node2:/root/.stratium
    ports:
      - "26658:26657"   # Tendermint RPC
      - "1318:1317"     # Cosmos REST API
      - "26661:26660"   # Prometheus Metrics
    environment:
      - DA_ENDPOINT=http://celestia_mock:8080
      - MINIMUM_GAS_PRICES=0strat
      - MONIKER=stratium-node-02
    command: ["stratiumd", "start", "--prometheus"]
    depends_on:
      - celestia_mock
      - stratium-node-01
    restart: unless-stopped

  # Node 3 - Validator
  stratium-node-03:
    build: 
      context: .
      dockerfile: Dockerfile
    hostname: stratium-node-03
    container_name: stratium-node-03
    networks:
      engram-net:
        ipv4_address: 172.20.0.12
    volumes:
      - ./build/testnet/node3:/root/.stratium
    ports:
      - "26659:26657"   # Tendermint RPC
      - "1319:1317"     # Cosmos REST API
      - "26662:26660"   # Prometheus Metrics
    environment:
      - DA_ENDPOINT=http://celestia_mock:8080
      - MINIMUM_GAS_PRICES=0strat
      - MONIKER=stratium-node-03
    command: ["stratiumd", "start", "--prometheus"]
    depends_on:
      - celestia_mock
      - stratium-node-01
    restart: unless-stopped


  # Node 4 - Validator
  stratium-node-04:
    build: 
      context: .
      dockerfile: Dockerfile
    hostname: stratium-node-04
    container_name: stratium-node-04
    networks:
      engram-net:
        ipv4_address: 172.20.0.13
    volumes:
      - ./build/testnet/node4:/root/.stratium
    ports:
      - "26660:26657"   # Tendermint RPC
      - "1320:1317"     # Cosmos REST API
      - "26663:26660"   # Prometheus Metrics
    environment:
      - DA_ENDPOINT=http://celestia_mock:8080
      - MINIMUM_GAS_PRICES=0strat
      - MONIKER=stratium-node-04
    command: ["stratiumd", "start", "--prometheus"]
    depends_on:
      - celestia_mock
      - stratium-node-01
    restart: unless-stopped

  # Monitoring - Prometheus
  prometheus:
    image: prom/prometheus:latest
    hostname: prometheus
    container_name: prometheus
    networks:
      engram-net:
        ipv4_address: 172.20.0.20
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
    restart: unless-stopped


  # Monitoring - Grafana
  grafana:
    image: grafana/grafana:latest
    hostname: grafana
    container_name: grafana
    networks:
      engram-net:
        ipv4_address: 172.20.0.21
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    depends_on:
      - prometheus
    restart: unless-stopped


networks:
  engram-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
          gateway: 172.20.0.1
    driver_opts:
      com.docker.network.bridge.name: "br-engram"

volumes:
  prometheus-data:
    name: prometheus-data
    driver: local
  grafana-data:
    name: grafana-data
    driver: local