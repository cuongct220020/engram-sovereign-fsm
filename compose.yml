name: Engram-app Chain

services:
  node0:
  build: 
    context: .
    dockerfile: Dockerfile
  container_name: engram_node0
  networks:
    engram-net:
      ipv4_address: 172.20.0.10
  volumes:
      - ./build/testnet/node1:/root/.stratium
  ports:
    - "26657:26657" # Tendermint RPC (Dành cho script Python gửi lệnh)
    - "1317:1317"   # Cosmos REST API
    - "26660:26660" # Prometheus Metrics
  environment:
    - DA_ENDPOINT=http://celestia_mock:8080
    - MINIMUM_GAS_PRICES=0strat
  command: ["stratiumd", "start", "--prometheus"]
  # develop:
  #   watch:



  
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./scripts/telemetry/prometheus.yml:/etc/prometheus/prometheus.yml
  
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"

  bitcoin-node:
    image: bitcoin/bitcoin:${HASH_TAG}
    container_name: bitcoin_regtest_engram
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
    ports:
      - "127.0.0.1:18443:18443" # RPC: Chỉ cho phép localhost truy cập để bảo mật
      - "18444:18444"           # P2P: Mở để các node bitcoin khác (nếu có) kết nối
      - "28332:28332"           # ZMQ Block (Mới)
      - "28333:28333"           # ZMQ Transaction (Mới)

    environment:
      - BITCOIN_DATA=/home/bitcoin/.bitcoin

    volumes:
      # Mount dữ liệu ra máy host để không mất blockchain data khi restart
      - ./bitcoin_data:/home/bitcoin/.bitcoin
      # Mount file cấu hình riêng (nếu cần tùy chỉnh sâu)
      # - ./bitcoin.conf:/home/bitcoin/.bitcoin/bitcoin.conf

    command:
      - -regtest=1            # Chế độ thử nghiệm, tự tạo block
      - -server=1             # Chấp nhận các lệnh RPC
      - -txindex=1            # Quan trọng: Cho phép Vigilantes tra cứu mọi transaction ID
      - -printtoconsole=1     # Đẩy log ra docker logs để dễ debug
      - -rpcbind=0.0.0.0      # Lắng nghe RPC từ trong mạng docker
      - -rpcallowip=0.0.0.0/0 # Cho phép các service khác trong compose gọi RPC
      # Cấu hình xác thực (Nên đưa vào file .env)
      - -rpcuser=${RPC_USER:-engram_admin}
      - -rpcpassword=${RPC_PASSWORD:-secure_password_123}
      - -fallbackfee=0.00001
      - -maxtxfee=0.1
      - -zmqpubrawblock=tcp://0.0.0.0:28332
      - -zmqpubrawtx=tcp://0.0.0.0:28333


